services:
  - type: web
    name: nwi-attendance
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: nwi-db
          property: connectionString

databases:
  - name: nwi-db
    plan: free